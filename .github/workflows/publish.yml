name: Publish Packages

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish @xplane/core
        if: startsWith(github.event.release.tag_name, 'core-v')
        run: pnpm --filter @xplane/core publish --access public --no-git-checks --provenance

      - name: Publish @xplane/function
        if: startsWith(github.event.release.tag_name, 'function-v')
        run: pnpm --filter @xplane/function publish --access public --no-git-checks --provenance

      - name: Publish @xplane/codegen
        if: startsWith(github.event.release.tag_name, 'codegen-v')
        run: pnpm --filter @xplane/codegen publish --access public --no-git-checks --provenance

      - name: No matching package tag
        if: ${{ !startsWith(github.event.release.tag_name, 'core-v') && !startsWith(github.event.release.tag_name, 'function-v') && !startsWith(github.event.release.tag_name, 'codegen-v') }}
        run: echo "Release tag ${{ github.event.release.tag_name }} does not match a publishable package tag"
